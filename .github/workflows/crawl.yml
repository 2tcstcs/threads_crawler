name: Hourly Threads Scraper

on:
  schedule:
    - cron: '0 * * * *'  # Runs at the start of every hour
  workflow_dispatch:      # Allows manual trigger from the GitHub Actions tab

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    
    # Permissions required to commit code changes back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Playwright & Chromium
        run: |
          # Install browser binaries and their system dependencies
          pip install playwright
          playwright install chromium --with-deps

      - name: Run Crawler
        run: |
          # We run the crawl with 2 scrolls per theme to gather a rich set of posts
          python crawler.py --scrolls 2

      - name: Commit and Push Data Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if data files have modified content
          if git status --porcelain | grep -qE "data.json|data.js"; then
            echo "Changes detected in data files. Committing..."
            git add data.json data.js
            git commit -m "chore: auto-update crawled Threads data [skip ci]"
            # Pull remote commits and automatically resolve conflicts in favor of newly crawled data
            git pull --rebase -X theirs origin main
            git push origin main
          else
            echo "No changes in crawled data. Skipping commit."
          fi
